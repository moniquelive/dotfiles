# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

right_format = "$cmd_duration$time"

# Inserts a blank line between shell prompts
add_newline = true
palette = "gruvbox_dark_hard"

[os]
disabled = false

[aws]
disabled = true

[cmd_duration]
show_milliseconds = true

[directory]
style = 'white'
truncate_to_repo = false
truncation_length = 0

[hostname]
ssh_only = false
aliases = { "Studiorama" = "🎙️", "armrama" = "💻" }

[memory_usage]
disabled = false
threshold = 50
# symbol = ' '
style = 'dimmed green'

[status]
disabled = false

[time]
disabled = false


[palettes.gruvbox_dark_hard]
black = "#1d2021"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
purple = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"
bright-black = "#928374"
bright-red = "#fb4934"
bright-green = "#b8bb26"
bright-yellow = "#fabd2f"
bright-blue = "#83a598"
bright-purple = "#d3869b"
bright-cyan = "#8ec07c"
bright-white = "#fbf1c7"
base = "#1d2021"
surface0 = "#3c3836"
surface1 = "#504945"
surface2 = "#665c54"
text = "#ebdbb2"
muted = "#928374"
